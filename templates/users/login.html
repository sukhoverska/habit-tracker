<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід — HabitTracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .bg-glow {
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
        }
        .glow-1 { background: #ec4899; top: -200px; left: -200px; }
        .glow-2 { background: #6366f1; bottom: -200px; right: -200px; }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(20px);
            position: relative;
            z-index: 1;
        }

        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
        .logo-icon { font-size: 32px; }
        .logo-text { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #ec4899, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        h1 { font-size: 28px; font-weight: 800; color: white; margin-bottom: 8px; }
        .subtitle { color: #64748b; font-size: 14px; margin-bottom: 32px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .form-group input {
            width: 100%; padding: 14px 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; font-size: 15px;
            color: white; font-family: inherit;
            transition: all 0.2s; outline: none;
        }
        .form-group input:focus {
            border-color: #ec4899;
            background: rgba(236,72,153,0.08);
            box-shadow: 0 0 0 3px rgba(236,72,153,0.15);
        }
        .form-group input::placeholder { color: #475569; }

        .btn-submit {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #ec4899, #6366f1);
            color: white; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: all 0.2s; margin-top: 8px;
        }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(236,72,153,0.3); }

        .divider { text-align: center; color: #475569; font-size: 13px; margin: 24px 0; }

        .link-text { text-align: center; font-size: 14px; color: #64748b; }
        .link-text a { color: #ec4899; text-decoration: none; font-weight: 600; }
        .link-text a:hover { text-decoration: underline; }

        .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; }

        /* Override Django form */
        p { margin-bottom: 20px; }
        p label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        p input {
            width: 100%; padding: 14px 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; font-size: 15px;
            color: white; font-family: inherit;
            transition: all 0.2s; outline: none;
        }
        p input:focus { border-color: #ec4899; background: rgba(236,72,153,0.08); }
        ul.errorlist { color: #f87171; font-size: 12px; list-style: none; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="card">
        <div class="logo">
            <span class="logo-icon">🎯</span>
            <span class="logo-text">HabitTracker</span>
        </div>

        <h1>Вітаємо назад! 👋</h1>
        <p class="subtitle">Увійди щоб продовжити відстежувати звички</p>

        {% if messages %}
            {% for message in messages %}
                <div class="error">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">Увійти →</button>
        </form>

        <div class="divider">або</div>

        <p class="link-text">
            Немає акаунту? <a href="{% url 'register' %}">Зареєструватись</a>
        </p>
    </div>
</body>
</html>
