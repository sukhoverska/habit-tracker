<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація — HabitTracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            padding: 40px 16px;
        }
        .bg-glow { position: absolute; width: 600px; height: 600px; border-radius: 50%; filter: blur(120px); opacity: 0.15; pointer-events: none; }
        .glow-1 { background: #6366f1; top: -200px; right: -200px; }
        .glow-2 { background: #ec4899; bottom: -200px; left: -200px; }

        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 48px 40px;
            width: 100%; max-width: 460px;
            backdrop-filter: blur(20px); position: relative; z-index: 1;
        }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
        .logo-icon { font-size: 32px; }
        .logo-text { font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #ec4899, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        h1 { font-size: 28px; font-weight: 800; color: white; margin-bottom: 8px; }
        .subtitle { color: #64748b; font-size: 14px; margin-bottom: 32px; }

        .btn-submit {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #ec4899, #6366f1);
            color: white; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 700; cursor: pointer;
            font-family: inherit; transition: all 0.2s; margin-top: 8px;
        }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(236,72,153,0.3); }

        .divider { text-align: center; color: #475569; font-size: 13px; margin: 24px 0; }
        .link-text { text-align: center; font-size: 14px; color: #64748b; }
        .link-text a { color: #ec4899; text-decoration: none; font-weight: 600; }

        p { margin-bottom: 20px; }
        p label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        p input {
            width: 100%; padding: 14px 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; font-size: 15px;
            color: white; font-family: inherit;
            transition: all 0.2s; outline: none;
        }
        p input:focus { border-color: #6366f1; background: rgba(99,102,241,0.08); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
        p input::placeholder { color: #475569; }
        ul.errorlist { color: #f87171; font-size: 12px; list-style: none; margin-top: 4px; }
        .helptext { font-size: 11px; color: #475569; margin-top: 4px; display: block; }
    </style>
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="card">
        <div class="logo">
            <span class="logo-icon">🎯</span>
            <span class="logo-text">HabitTracker</span>
        </div>

        <h1>Створи акаунт ✨</h1>
        <p class="subtitle">Почни відстежувати свої звички вже сьогодні</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">Зареєструватись →</button>
        </form>

        <div class="divider">або</div>

        <p class="link-text">
            Вже маєш акаунт? <a href="{% url 'login' %}">Увійти</a>
        </p>
    </div>
</body>
</html>
